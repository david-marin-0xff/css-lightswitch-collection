<!DOCTYPE html>
<html>
<head>
<style>

body{
  background:#555;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial;
}

/* hidden checkbox */
#light-switch{
  display:none;
}

/* plate */
#light-switch-label{
  position:relative;
  display:block;
  height:220px;
  width:140px;
  background:#f2e5bf;
  border-radius:8px;
  margin:auto;

  box-shadow:
  inset 0 3px 5px rgba(255,255,255,.6),
  inset 0 -4px 8px rgba(0,0,0,.25),
  0 8px 20px rgba(0,0,0,.4);
}

/* screws */
.screw{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#bfae7a;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.6);
}

.screw:first-child{ top:15px; }
.screw:last-child{ bottom:15px; }

/* switch body */
.switch{
  cursor:pointer;
  height:120px;
  width:70px;
  background:#fff8dc;

  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);

  border-radius:4px;
  overflow:hidden;

  box-shadow:
    inset 0 3px 4px rgba(255,255,255,.8),
    inset 0 -5px 8px rgba(0,0,0,.25),
    0 0 0 4px #f2e5bf,
    0 0 0 5px rgba(0,0,0,.1);
}

/* ON text */
.switch:before{
  content:"ON";
  display:block;
  height:60px;
  line-height:60px;
  text-align:center;

  font-weight:bold;
  letter-spacing:2px;

  background:#f5e7c5;
  color:#d0b88a;

  box-shadow: inset 0 -2px 4px rgba(0,0,0,.15);

  transition:.25s;
}

/* OFF text */
.switch:after{
  content:"OFF";
  display:block;
  height:60px;
  line-height:60px;
  text-align:center;

  font-weight:bold;
  letter-spacing:2px;

  background:#fff8dc;
  color:#c95a30;

  box-shadow: inset 0 2px 4px rgba(0,0,0,.1);

  transition:.25s;
}

/* toggle effect */
#light-switch:checked + label .switch:before{
  transform:translateY(60px);
  color:#2ecc40;
}

#light-switch:checked + label .switch:after{
  transform:translateY(-60px);
  color:#cbb78c;
}

</style>
</head>

<body>

<input type="checkbox" id="light-switch">

<label for="light-switch" id="light-switch-label">
  <div class="screw"></div>
  <div class="switch"></div>
  <div class="screw"></div>
</label>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Lightswitch</title>

<style>

body{
    background:#2b2b2b;
    font-family:monospace;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* hide checkbox */

    display:none;
}

    background:#e5e5e5;
    width:90px;
    padding:12px;
    border-radius:6px;
    text-align:center;
    cursor:pointer;
    box-shadow:
        inset 0 0 3px rgba(0,0,0,0.6),
        0 6px 10px rgba(0,0,0,0.5);
}

#lslabel{
    font-size:12px;
    color:#333;
}

/* switch body */
.switch{
    position:relative;
    width:40px;
    height:60px;
    margin:8px auto;
    background:#f0f0f0;
    border-radius:4px;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.5);
}

/* toggle lever */
.switch::before{
    content:"";
    position:absolute;
    width:30px;
    height:26px;
    background:#d6d6d6;
    left:5px;
    top:5px;
    border-radius:3px;
    box-shadow: inset 0 2px 2px rgba(0,0,0,0.3);
    transition:0.25s;
}

/* move lever when checked */
#light-switch:checked + label .switch::before{
    top:30px;
}

/* screws */
.screw{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#666;
    margin:6px auto;
    box-shadow: inset 0 1px 1px rgba(0,0,0,0.8);
}

</style>
</head>

<body>

<input type="checkbox" id="light-switch">

<label for="light-switch" id="light-switch-label">
    <span id="lslabel">Lightswitch</span>
    <div class="screw"></div>
    <div class="switch"></div>
    <div class="screw"></div>
</label>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Realistic Light Switch</title>

<style>

body{
  background:#4a4a4a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:Arial, sans-serif;
}

/* hide checkbox */
#light-switch{
  display:none;
}

/* plate */
#light-switch-label{
  position:relative;
  width:140px;
  height:200px;
  background:#e9dcb7;
  border-radius:14px;
  cursor:pointer;

  box-shadow:
  inset 0 4px 8px rgba(255,255,255,.7),
  inset 0 -6px 10px rgba(0,0,0,.25),
  0 10px 20px rgba(0,0,0,.4);
}

/* screws */
.screw{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#b7a882;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  box-shadow: inset 0 1px 2px rgba(0,0,0,.6);
}

.screw:nth-of-type(1){ top:14px; }
.screw:nth-of-type(3){ bottom:14px; }

/* inner frame */
.switch-frame{
  position:absolute;
  width:90px;
  height:130px;
  background:#efe1bc;
  border-radius:12px;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);

  box-shadow:
  inset 0 3px 4px rgba(0,0,0,.15),
  inset 0 -3px 5px rgba(255,255,255,.6);
}

/* toggle */
.switch{
  position:absolute;
  width:64px;
  height:100px;
  left:50%;
  top:50%;
  transform:translate(-50%,-60%);
  border-radius:10px;

  background:linear-gradient(#f5e6c4,#e3d2a7);

  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;

  padding:10px 0;
  font-weight:bold;
  letter-spacing:2px;

  box-shadow:
  inset 0 4px 6px rgba(255,255,255,.8),
  inset 0 -5px 8px rgba(0,0,0,.25),
  0 3px 5px rgba(0,0,0,.2);

  transition:0.25s;
}

/* ON text */
.on{
  color:#bda76d;
}

/* OFF text */
.off{
  color:#c9552f;
}

/* pressed position */
#light-switch:checked + label .switch{
  transform:translate(-50%,-35%);
}

/* active colors */
#light-switch:checked + label .on{
  color:#39b54a;
}

#light-switch:checked + label .off{
  color:#cbb689;
}

</style>
</head>

<body>

<input type="checkbox" id="light-switch">

<label for="light-switch" id="light-switch-label">

<div class="screw"></div>

<div class="switch-frame">
  <div class="switch">
    <div class="on">ON</div>
    <div class="off">OFF</div>
  </div>
</div>

<div class="screw"></div>

</label>

</body>
</html>

<input type="checkbox">
<span></span>
</label>

<style>
.steam-switch{
display:inline-block;

height:70px;

transform:translateX(-50%) rotate(-40deg);

}

.steam-switch input:checked + span{
transform:translateX(-50%) rotate(40deg);
